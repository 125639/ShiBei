# 前端形态:postgres + 前端应用(含轻量 sync-worker)。
# backend 地址、共享密钥、自动/手动模式可启动后在 /admin/sync 网页端保存。

services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "shared_buffers=32MB", "-c", "max_connections=20"]
    environment:
      POSTGRES_USER: shibei
      POSTGRES_PASSWORD: shibei
      POSTGRES_DB: shibei_blog
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shibei -d shibei_blog"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 128m
    restart: unless-stopped

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      APP_MODE: frontend
      NODE_OPTIONS: --max-old-space-size=256
    ports:
      - "80:3000"
      - "3000:3000"
    command: ["sh", "scripts/start-app.sh"]
    volumes:
      - app-uploads:/app/public/uploads
    mem_limit: 320m
    restart: unless-stopped

volumes:
  postgres-data:
  app-uploads:
