<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fd4c6"/>
      <stop offset="0.38" stop-color="#c2e8d9"/>
      <stop offset="0.66" stop-color="#f2e9d8"/>
      <stop offset="1" stop-color="#f7dbe4"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.72" cy="0.30" r="0.42">
      <stop offset="0" stop-color="#fffbe8" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#fff3d4" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#fff3d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hillA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fd8c5"/>
      <stop offset="1" stop-color="#7cc4ad"/>
    </linearGradient>
    <linearGradient id="hillB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#63b299"/>
      <stop offset="1" stop-color="#4a9c83"/>
    </linearGradient>
    <linearGradient id="hillC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d8a70"/>
      <stop offset="1" stop-color="#2f6f5a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1600" height="720" fill="url(#sky)"/>
  <rect width="1600" height="720" fill="url(#sun)"/>

  <!-- 云 -->
  <g fill="#ffffff" filter="url(#soft)">
    <ellipse cx="320" cy="150" rx="220" ry="42" opacity="0.55"/>
    <ellipse cx="520" cy="196" rx="160" ry="30" opacity="0.4"/>
    <ellipse cx="1180" cy="120" rx="260" ry="40" opacity="0.5"/>
    <ellipse cx="1370" cy="220" rx="170" ry="28" opacity="0.38"/>
    <ellipse cx="820" cy="90" rx="180" ry="26" opacity="0.32"/>
  </g>

  <!-- 远山 -->
  <path fill="url(#hillA)" opacity="0.9" d="M0 470 Q 180 360 400 430 T 800 420 Q 1020 350 1240 430 T 1600 410 V 720 H 0 Z"/>
  <!-- 中山 -->
  <path fill="url(#hillB)" opacity="0.95" d="M0 540 Q 240 440 480 520 T 900 510 Q 1140 440 1360 520 T 1600 500 V 720 H 0 Z"/>
  <!-- 近山 -->
  <path fill="url(#hillC)" d="M0 620 Q 200 540 460 600 T 940 600 Q 1200 540 1420 610 T 1600 600 V 720 H 0 Z"/>

  <!-- 草叶剪影 -->
  <g stroke="#275b4a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M120 650 q 6 -46 -8 -78"/>
    <path d="M138 655 q 2 -38 14 -64"/>
    <path d="M1452 640 q 8 -44 -4 -76"/>
    <path d="M1474 648 q 0 -36 14 -60"/>
    <path d="M760 660 q 4 -34 -6 -58"/>
  </g>

  <!-- 流萤 -->
  <g fill="#ffef9e">
    <g filter="url(#glow)" opacity="0.9">
      <circle cx="260" cy="520" r="7"/>
      <circle cx="420" cy="450" r="5"/>
      <circle cx="640" cy="530" r="6"/>
      <circle cx="900" cy="470" r="7"/>
      <circle cx="1120" cy="540" r="5"/>
      <circle cx="1330" cy="480" r="6"/>
      <circle cx="1490" cy="560" r="4"/>
      <circle cx="150" cy="420" r="4"/>
      <circle cx="770" cy="380" r="4"/>
      <circle cx="1030" cy="360" r="3.5"/>
    </g>
    <g opacity="0.95">
      <circle cx="260" cy="520" r="2.4"/>
      <circle cx="420" cy="450" r="1.8"/>
      <circle cx="640" cy="530" r="2.2"/>
      <circle cx="900" cy="470" r="2.4"/>
      <circle cx="1120" cy="540" r="1.8"/>
      <circle cx="1330" cy="480" r="2"/>
      <circle cx="150" cy="420" r="1.5"/>
      <circle cx="770" cy="380" r="1.5"/>
    </g>
  </g>

  <!-- 星点 -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="210" cy="120" r="1.6"/>
    <circle cx="480" cy="80" r="1.2"/>
    <circle cx="700" cy="150" r="1.4"/>
    <circle cx="960" cy="70" r="1.2"/>
    <circle cx="1260" cy="170" r="1.5"/>
    <circle cx="1440" cy="90" r="1.2"/>
  </g>
</svg>
