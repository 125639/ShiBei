services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "max_connections=50"]
    environment:
      POSTGRES_USER: shibei
      POSTGRES_PASSWORD: shibei
      POSTGRES_DB: shibei_blog
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shibei -d shibei_blog"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "192mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped

  app:
    image: safg/shibei:full
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_MODE: full
      NODE_OPTIONS: --max-old-space-size=1024
    ports:
      - "80:3000"
      - "3000:3000"
    command: ["sh", "scripts/start-app.sh"]
    volumes:
      - app-uploads:/app/public/uploads
    healthcheck:
      # 用 node 直接发请求，避免镜像里没有 curl/wget。
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    mem_limit: 1024m
    restart: unless-stopped

  worker:
    image: safg/shibei:full
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_MODE: full
      NODE_OPTIONS: --max-old-space-size=1024
      FETCH_WORKER_CONCURRENCY: 1
      RESEARCH_WORKER_CONCURRENCY: 1
      AUDIENCE_WORKER_CONCURRENCY: 1
      SCHEDULE_WORKER_CONCURRENCY: 1
    command: ["npm", "run", "worker"]
    volumes:
      - app-uploads:/app/public/uploads
    mem_limit: 1536m
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  app-uploads:
