services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "max_connections=50"]
    environment:
      POSTGRES_USER: shibei
      POSTGRES_PASSWORD: shibei
      POSTGRES_DB: shibei_blog
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shibei -d shibei_blog"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "192mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped

  app:
    image: safg/shibei:full
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_MODE: full
      NODE_OPTIONS: --max-old-space-size=1024
    ports:
      - "3000:3000"
    command: ["sh", "scripts/start-app.sh"]
    volumes:
      - app-uploads:/app/public/uploads
    healthcheck:
      # 用 node 直接发请求，避免镜像里没有 curl/wget。
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    mem_limit: 1024m
    restart: unless-stopped

  worker:
    image: safg/shibei:full
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_MODE: full
      NODE_OPTIONS: --max-old-space-size=1024
      FETCH_WORKER_CONCURRENCY: 1
      RESEARCH_WORKER_CONCURRENCY: 1
      AUDIENCE_WORKER_CONCURRENCY: 1
      SCHEDULE_WORKER_CONCURRENCY: 1
    command: ["npm", "run", "worker"]
    volumes:
      - app-uploads:/app/public/uploads
    mem_limit: 1536m
    restart: unless-stopped

  # 网页端一键更新伴车：管理后台「系统更新」页 / 左上角新版本弹窗靠它执行
  # git fetch/reset + docker compose build/up。只在 compose 内网监听（不映射端口），
  # 鉴权用 UPDATER_TOKEN（缺省复用 .env 里的 AUTH_SECRET）。
  # 注意：挂载 docker.sock 等价于宿主 root 权限，绝不能把 9080 暴露到公网。
  updater:
    image: safg/shibei:updater
    build:
      context: .
      dockerfile: Dockerfile.updater
    env_file:
      - .env
    environment:
      COMPOSE_FILE_NAME: docker-compose.yml
      # app 与 worker 共用 safg/shibei:full 镜像：只构建 app，up 时 worker 自动换新镜像
      UPDATE_BUILD_SERVICES: app
      UPDATE_SERVICES: app worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 5s
      retries: 3
    mem_limit: 128m
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  app-uploads:
