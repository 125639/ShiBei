# 前端形态 docker compose:postgres + 前端应用(含 sync-worker 在容器内并发跑)。
#
# 用法:
#   1) 准备 .env(从 .env.example 复制并修改):
#      只需准备 AUTH_SECRET / ENCRYPTION_KEY / 管理员账号。
#      backend 地址、共享密钥、自动/手动模式可启动后在 /admin/sync 网页端保存。
#   2) docker compose -f docker-compose.frontend.yml up -d
#
# 与完整版的差异:
#   - 没有 redis(无 BullMQ)
#   - 没有 worker 容器(只有 app + sync-worker 同进程)
#   - app 镜像换成 Dockerfile.frontend(无 Playwright/yt-dlp/ffmpeg)

services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "shared_buffers=32MB", "-c", "max_connections=20"]
    environment:
      POSTGRES_USER: shibei
      POSTGRES_PASSWORD: shibei
      POSTGRES_DB: shibei_blog
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shibei -d shibei_blog"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 128m
    restart: unless-stopped

  app:
    image: safg/shibei:frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_MODE: frontend
      # 容器里有两个 Node 进程(Next + sync-worker)，都继承这里的堆上限；
      # 224MB×2 的最坏情况仍在 448m 限额内，实测常态 RSS ~320MB。
      NODE_OPTIONS: --max-old-space-size=224
    ports:
      - "3000:3000"
    command: ["sh", "scripts/start-app.sh"]
    volumes:
      # 持久化用户上传的视频/音乐(导入的 ZIP 也会落到这里)
      - app-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    # 实测(2026-07-04): 320m 时热身后 RSS 到 318MiB，贴着上限跑，大 ZIP 导入
    # 必被 OOM 杀。448m + postgres 128m = 576m 硬顶，765MB 小机上给系统留 ~190MB。
    mem_limit: 448m
    restart: unless-stopped

  # 网页端一键更新伴车（前端形态只重建 app 一个服务）。
  # 挂载 docker.sock = 宿主 root 权限，只在内网监听，绝不暴露端口。
  # 内存点评：构建由宿主 dockerd 执行，updater 本身只是转发命令，192m 足够。
  updater:
    image: safg/shibei:updater
    build:
      context: .
      dockerfile: Dockerfile.updater
    env_file:
      - .env
    environment:
      COMPOSE_FILE_NAME: docker-compose.frontend.yml
      UPDATE_BUILD_SERVICES: app
      UPDATE_SERVICES: app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 5s
      retries: 3
    mem_limit: 128m
    restart: unless-stopped

volumes:
  postgres-data:
  app-uploads:
